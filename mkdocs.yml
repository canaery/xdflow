site_name: XDFlow
site_description: Dimension-aware, metadata-driven ML pipelines for scientific data
site_url: !ENV [READTHEDOCS_CANONICAL_URL, "https://xdflow.readthedocs.io/"]
repo_url: https://github.com/canaery/xdflow
repo_name: canaery/xdflow
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  features:
    - navigation.sections
    - navigation.instant
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: amber

extra_javascript:
  - javascript/readthedocs.js

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            docstring_style: google
            docstring_options:
              warnings: false
              warn_missing_types: false
              warn_unknown_params: false
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            show_root_full_path: false
            show_root_heading: true
            show_signature_annotations: true
            show_source: true

nav:
  - Overview: index.md
  - Installation: installation.md
  - Concepts:
      - concepts/index.md
      - Data Contract: concepts/data_contract.md
      - Composing Pipelines: concepts/composition.md
      - Tuning: concepts/tuning.md
  - Tutorials:
      - tutorials/index.md
      - 5-Minute Core Quickstart: tutorials/quickstart.md
      - Hyperparameter Tuning: tutorials/tuning.md
      - Spectral Pipeline Walkthrough: tutorials/basic-pipeline.md
      - Reusable ML Patterns: tutorials/reusable-ml-patterns.md
  - Guides:
      - Using XDFlow With LLMs: guides/llm.md
  - API Reference:
      - api/index.md
      - Core: api/core.md
      - Composition: api/composition.md
      - Cross-Validation: api/cv.md
      - Tuning: api/tuning.md
      - Transforms: api/transforms.md
      - Utilities: api/utils.md
  - Development: development.md
